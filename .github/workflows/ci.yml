name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall src tests

      - name: Test
        run: pytest

      - name: Convert example observables
        run: cti-lab convert -i examples/observables.csv --misp reports/misp-event.json --stix reports/stix-bundle.json --markdown reports/report.md

